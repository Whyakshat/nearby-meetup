name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Install server dependencies
      run: |
        cd server
        npm ci

    - name: Run linter
      run: npm run lint

    - name: Run server tests
      run: |
        cd server
        npm run test
